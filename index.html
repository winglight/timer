<style>
html, body { min-height: 100%; margin: 0; }
body { background: linear-gradient(180deg, #ffffff 0%, #f4f9fc 100%); color: #0f4c81; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
.page { width: min(960px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 32px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.panel { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; color: #0f4c81; }
.controls { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; width: 100%; }
.controls label { display: flex; align-items: center; gap: 8px; font-size: 14px; background: rgba(255, 255, 255, 0.85); padding: 10px 12px; border-radius: 12px; box-shadow: 0 4px 16px rgba(15, 76, 129, 0.08); }
.controls input[type="range"] { width: 150px; accent-color: #0f4c81; }
.btn { background: #0f4c81; color: #fff; border: none; padding: 10px 16px; border-radius: 10px; font-size: 15px; cursor: pointer; transition: transform 0.2s ease, opacity 0.2s ease; }
.btn:hover { transform: translateY(-1px); }
.btn-secondary { background: #ffffff; color: #0f4c81; border: 1px solid rgba(15, 76, 129, 0.18); }
.time-left { font-size: 32px; font-weight: 700; color: #0f4c81; }
.wrap { display: flex; align-items: center; justify-content: center; width: 100%; min-height: 320px; }
.circle { position: relative; width: 240px; height: 240px; border-radius: 50%; background: #a7d8f0; display: flex; align-items: center; justify-content: center; transform: scale(0.7); transition: transform 4s ease-in-out; will-change: transform; box-shadow: 0 8px 24px rgba(167, 216, 240, 0.6); }
.circle::before { content: ""; position: absolute; inset: -28px; border-radius: 50%; pointer-events: none; z-index: -1; background: radial-gradient(circle at center, rgba(167,216,240,0.65) 30%, rgba(167,216,240,0.35) 65%, rgba(255,255,255,1) 100%); filter: blur(0.6px); display: none; }
.wave-svg { position: absolute; top: -56px; left: -56px; width: 352px; height: 352px; pointer-events: none; z-index: -1; filter: blur(0.6px); overflow: visible; }
.circle.vibrating .wave-svg { animation: ringPulse 2s ease-in-out infinite; }
.label { font-size: 32px; color: #0f4c81; letter-spacing: 1px; }
.calendar-section { width: min(100%, 480px); background: rgba(255, 255, 255, 0.92); border-radius: 14px; box-shadow: 0 8px 20px rgba(15, 76, 129, 0.08); padding: 10px; box-sizing: border-box; }
.calendar-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.calendar-nav { display: flex; align-items: center; gap: 6px; }
.nav-btn, .month-title-btn { border: none; background: transparent; color: #0f4c81; cursor: pointer; }
.nav-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(15, 76, 129, 0.08); font-size: 14px; }
.month-title-btn { font-size: 16px; font-weight: 700; padding: 4px 6px; border-radius: 8px; }
.month-title-btn:hover, .nav-btn:hover { background: rgba(15, 76, 129, 0.12); }
.calendar-summary { margin-top: 6px; font-size: 11px; color: #3d6990; }
.sync-status { margin-top: 4px; min-height: 16px; font-size: 10px; color: #6b8097; }
.sync-status[data-tone="success"] { color: #16824b; }
.sync-status[data-tone="error"] { color: #b03a48; }
.sync-status[data-tone="info"] { color: #3d6990; }
.calendar-weekdays, .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
.calendar-weekdays { margin-top: 10px; font-size: 10px; color: #6b8097; text-align: center; }
.calendar-grid { margin-top: 6px; }
.calendar-cell { position: relative; aspect-ratio: 1 / 1; padding: 4px; border-radius: 8px; background: #f8fbfe; border: 1px solid rgba(15, 76, 129, 0.08); box-sizing: border-box; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.calendar-cell.is-other-month { opacity: 0.45; }
.calendar-cell.is-today { border-color: rgba(15, 76, 129, 0.35); box-shadow: inset 0 0 0 1px rgba(15, 76, 129, 0.12); }
.calendar-cell.is-goal-met { background: #e8f6e8; }
.calendar-cell.is-goal-missed { background: #fae7e7; }
.date-number { position: relative; z-index: 1; font-size: 11px; font-weight: 700; }
.calendar-metric-inline { position: relative; z-index: 1; margin-top: auto; font-size: 10px; font-weight: 700; color: #0f4c81; line-height: 1.1; word-break: break-word; }
@keyframes ringPulse {
  0%   { transform: scale(1); opacity: 0.95; }
  50%  { transform: scale(1.08); opacity: 1; }
  100% { transform: scale(1); opacity: 0.95; }
}
@media (max-width: 768px) {
  .page { width: calc(100% - 24px); padding-top: 16px; }
  .controls { justify-content: stretch; }
  .controls label { width: 100%; box-sizing: border-box; justify-content: space-between; }
  .controls input[type="range"] { width: 120px; }
  .time-left { font-size: 28px; }
  .calendar-section { width: min(100%, 420px); padding: 9px; }
  .month-title-btn { font-size: 15px; }
}
@media (max-width: 576px) {
  .calendar-toolbar { align-items: stretch; }
  .calendar-nav { justify-content: center; }
  .calendar-actions { display: flex; justify-content: center; }
  .calendar-section { width: 100%; }
  .calendar-weekdays, .calendar-grid { gap: 3px; }
  .calendar-cell { padding: 3px; }
  .date-number { font-size: 10px; }
  .calendar-metric-inline { font-size: 9px; }
}
</style>

<body>
<main class="page">
  <section class="panel">
    <div class="controls">
      <label>吸时长
        <input id="inhaleRange" type="range" min="1" max="20" step="1" value="4">
        <span id="inhaleVal">4</span>s
      </label>

        <span id="exhaleVal">6</span>s

      <label>暂停时长
        <input id="pauseRange" type="range" min="0" max="15" step="1" value="0">

</main>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script type="module">
import { R2Sync } from './r2-sync.js';

const DEFAULT_SESSION_SECONDS = 600;
const DAILY_GOAL_SECONDS = 600;
const SETTINGS_KEY = 'breath_settings';
const HISTORY_KEY = 'breath_history';
const LAST_SYNC_KEY = 'breath_history_last_sync';
const HISTORY_ENTITY = 'breath-history';

const circle = document.getElementById('circle');
const label = document.getElementById('label');
const inhaleRange = document.getElementById('inhaleRange');
const exhaleRange = document.getElementById('exhaleRange');
const pauseRange = document.getElementById('pauseRange');
const inhaleVal = document.getElementById('inhaleVal');
const exhaleVal = document.getElementById('exhaleVal');
const pauseVal = document.getElementById('pauseVal');
const remainingEl = document.getElementById('remaining');
const toggleBtn = document.getElementById('toggleBtn');
const configBtn = document.getElementById('configBtn');
const prevMonthBtn = document.getElementById('prevMonthBtn');
const nextMonthBtn = document.getElementById('nextMonthBtn');
const monthTitleBtn = document.getElementById('monthTitleBtn');
const calendarGrid = document.getElementById('calendarGrid');
const calendarSummary = document.getElementById('calendarSummary');
const syncStatus = document.getElementById('syncStatus');

const r2Sync = new R2Sync();

let phase = 'inhale';
let secondsLeft = 0;
let sessionLeft = DEFAULT_SESSION_SECONDS;
let running = false;
let timer = null;
let nextAfterPause = null;
let audioCtx = null;
let activeRun = null;
let historyRecords = loadHistoryRecords();
let displayedMonth = startOfMonth(new Date());

function pad(value) {
  return String(value).padStart(2, '0');
}

function formatTime(seconds) {
  const safeSeconds = Math.max(0, seconds);
  const minutes = Math.floor(safeSeconds / 60);
  const remainingSeconds = safeSeconds % 60;
  return `${pad(minutes)}:${pad(remainingSeconds)}`;
}

function formatMonthTitle(date) {
  return `${date.getFullYear()}- ${pad(date.getMonth() + 1)}`;
}

function formatMonthInput(date) {
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;
}

function formatDurationCompact(seconds) {
  const safeSeconds = Math.max(0, seconds);
  const hours = Math.floor(safeSeconds / 3600);
  const minutes = Math.floor((safeSeconds % 3600) / 60);
  const remainingSeconds = safeSeconds % 60;
  if (hours > 0) {
    return `${hours}h${pad(minutes)}`;
  }
  return `${pad(minutes)}:${pad(remainingSeconds)}`;
}

function formatDurationMinutes(seconds) {
  const safeSeconds = Math.max(0, seconds);
  return String(Math.ceil(safeSeconds / 60));
}

function formatDurationLong(seconds) {
  const safeSeconds = Math.max(0, seconds);
  const hours = Math.floor(safeSeconds / 3600);
  const minutes = Math.floor((safeSeconds % 3600) / 60);
  const remainingSeconds = safeSeconds % 60;
  const parts = [];
  if (hours > 0) parts.push(`${hours}小时`);
  if (minutes > 0 || hours > 0) parts.push(`${minutes}分`);
  parts.push(`${remainingSeconds}秒`);
  return parts.join('');
}

function startOfMonth(date) {
  return new Date(date.getFullYear(), date.getMonth(), 1);
}

function shiftMonth(date, offset) {
  return new Date(date.getFullYear(), date.getMonth() + offset, 1);
}

function getDateKey(date) {
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
}

function getInhale() {
  return parseInt(inhaleRange.value, 10);
}

function getExhale() {
  return parseInt(exhaleRange.value, 10);
}

function getPause() {
  return parseInt(pauseRange.value, 10);
}

function getSettingsSnapshot() {
  return {
    inhale: getInhale(),
    exhale: getExhale(),
    pause: getPause()
  };
}

function setSyncStatus(message, tone = '') {
  syncStatus.textContent = message;
  if (tone) {
    syncStatus.dataset.tone = tone;
  } else {
    delete syncStatus.dataset.tone;
  }
}

function refreshSyncStatus() {
  if (!r2Sync.config.enabled) {
    setSyncStatus('云同步未启用，当前仅保存在本地浏览器。');
    return;
  }
  const lastSyncedAt = localStorage.getItem(LAST_SYNC_KEY);
  if (lastSyncedAt) {
    setSyncStatus(`云同步已启用，上次同步：${new Date(lastSyncedAt).toLocaleString()}`, 'success');
    return;
  }
  setSyncStatus('云同步已启用，等待首次同步。', 'info');
}

function saveSettings() {
  const data = getSettingsSnapshot();
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(data));
  } catch (error) {
    console.error('Save settings failed:', error);
  }
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (typeof data.inhale === 'number') inhaleRange.value = String(data.inhale);
      if (typeof data.exhale === 'number') exhaleRange.value = String(data.exhale);
      if (typeof data.pause === 'number') pauseRange.value = String(data.pause);
    }
  } catch (error) {
    console.error('Load settings failed:', error);
  }
  inhaleVal.textContent = inhaleRange.value;
  exhaleVal.textContent = exhaleRange.value;
  pauseVal.textContent = pauseRange.value;
}

function normalizeRecord(record) {
  if (!record || typeof record !== 'object') return null;
  const startedAt = typeof record.startedAt === 'string' ? record.startedAt : null;
  const endedAt = typeof record.endedAt === 'string' ? record.endedAt : null;
  const durationSec = Number(record.durationSec);
  if (!startedAt || !endedAt || !Number.isFinite(durationSec) || durationSec <= 0) {
    return null;
  }
  const settings = record.settings && typeof record.settings === 'object' ? record.settings : {};
  const fallbackId = [startedAt, endedAt, durationSec, settings.inhale, settings.exhale, settings.pause].join('|');
  return {
    id: typeof record.id === 'string' && record.id ? record.id : fallbackId,
    startedAt,
    endedAt,
    durationSec: Math.round(durationSec),
    settings: {
      inhale: Number(settings.inhale) || 0,
      exhale: Number(settings.exhale) || 0,
      pause: Number(settings.pause) || 0
    },
    sessionRemainingAtStart: Number(record.sessionRemainingAtStart) || 0,
    sessionRemainingAtEnd: Number(record.sessionRemainingAtEnd) || 0,
    reason: typeof record.reason === 'string' ? record.reason : 'stop'
  };
}

function mergeHistories(...lists) {
  const merged = new Map();
  lists.flat().forEach((item) => {
    const record = normalizeRecord(item);
    if (!record) return;
    merged.set(record.id, record);
  });
  return Array.from(merged.values()).sort((a, b) => {
    return new Date(b.startedAt).getTime() - new Date(a.startedAt).getTime();
  });
}

function loadHistoryRecords() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? mergeHistories(parsed) : [];
  } catch (error) {
    console.error('Load history failed:', error);
    return [];
  }
}

function saveHistoryRecords(records) {
  historyRecords = mergeHistories(records);
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(historyRecords));
  } catch (error) {
    console.error('Save history failed:', error);
  }
  renderCalendar();
}

async function syncHistoryToCloud() {
  if (!r2Sync.config.enabled) {
    refreshSyncStatus();
    return false;
  }
  setSyncStatus('正在同步到云端...', 'info');
  const ok = await r2Sync.syncToR2(historyRecords, HISTORY_ENTITY);
  if (ok) {
    const now = new Date().toISOString();
    localStorage.setItem(LAST_SYNC_KEY, now);
    setSyncStatus(`云端同步完成：${new Date(now).toLocaleString()}`, 'success');
    return true;
  } else {
    setSyncStatus('云端同步失败，请检查 R2 配置。', 'error');
    return false;
  }
}

async function hydrateHistoryFromCloud() {
  if (!r2Sync.config.enabled) {
    refreshSyncStatus();
    return false;
  }
  setSyncStatus('正在从云端获取记录...', 'info');
  const result = await r2Sync.loadFromR2(HISTORY_ENTITY);

  if (result && result.reason === 'not_found') {
    setSyncStatus('云端还没有历史文件，正在初始化...', 'info');
    const initialized = await syncHistoryToCloud();
    if (initialized !== false) {
      setSyncStatus('首次同步已完成，云端历史文件已创建。', 'success');
    }
    return false;
  }

  if (!result || !result.ok || !Array.isArray(result.data)) {
    if (result && result.reason === 'timeout') {
      setSyncStatus('连接云端超时，请稍后重试。', 'error');
      return false;
    }
    if (result && result.reason === 'network_error') {
      setSyncStatus('无法连接到云端，请检查地址和网络。', 'error');
      return false;
    }
    refreshSyncStatus();
    return false;
  }
  const remoteRecords = result.data;
  const merged = mergeHistories(historyRecords, remoteRecords);
  const changed = JSON.stringify(merged) !== JSON.stringify(historyRecords);
  if (changed) {
    saveHistoryRecords(merged);
  } else {
    renderCalendar();
  }
  setSyncStatus(`已从云端更新 ${remoteRecords.length} 条记录。`, 'success');
  return changed;
}

function aggregateHistoryByDate() {
  const daily = {};
  historyRecords.forEach((record) => {
    const date = new Date(record.startedAt);
    if (Number.isNaN(date.getTime())) return;
    const key = getDateKey(date);
    if (!daily[key]) {
      daily[key] = { count: 0, durationSec: 0 };
    }
    daily[key].count += 1;
    daily[key].durationSec += record.durationSec;
  });
  return daily;
}

function renderCalendar() {
  const metricsByDate = aggregateHistoryByDate();
  const year = displayedMonth.getFullYear();
  const month = displayedMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const firstWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const today = new Date();
  const todayKey = getDateKey(today);
  const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const monthRecords = historyRecords.filter((record) => {
    const date = new Date(record.startedAt);
    return date.getFullYear() === year && date.getMonth() === month;
  });
  const monthCount = monthRecords.length;
  const monthDurationSec = monthRecords.reduce((total, record) => total + record.durationSec, 0);

  monthTitleBtn.textContent = formatMonthTitle(displayedMonth);
  calendarSummary.textContent = `本月共 ${monthCount} 次呼吸练习，累计 ${formatDurationLong(monthDurationSec)}。点击年月标题可直接跳转。`;
  calendarGrid.innerHTML = '';

  for (let index = 0; index < 42; index += 1) {
    const cell = document.createElement('div');
    cell.className = 'calendar-cell';
    let cellDate;
    let inCurrentMonth = true;

    if (index < firstWeekday) {
      cellDate = new Date(year, month - 1, daysInPrevMonth - firstWeekday + index + 1);
      inCurrentMonth = false;
    } else if (index >= firstWeekday + daysInMonth) {
      cellDate = new Date(year, month + 1, index - firstWeekday - daysInMonth + 1);
      inCurrentMonth = false;
    } else {
      cellDate = new Date(year, month, index - firstWeekday + 1);
    }

    const key = getDateKey(cellDate);
    const metric = metricsByDate[key] || { count: 0, durationSec: 0 };
    const isGoalMet = metric.durationSec >= DAILY_GOAL_SECONDS;
    const cellDateStart = new Date(cellDate.getFullYear(), cellDate.getMonth(), cellDate.getDate());
    const isPastOrToday = cellDateStart.getTime() <= todayStart.getTime();

    if (!inCurrentMonth) {
      cell.classList.add('is-other-month');
    } else if (isGoalMet) {
      cell.classList.add('is-goal-met');
    } else if (isPastOrToday) {
      cell.classList.add('is-goal-missed');
    }
    if (key === todayKey) {
      cell.classList.add('is-today');
    }

    cell.innerHTML = `
      <div class="date-number">${cellDate.getDate()}</div>
      <div class="calendar-metric-inline">${metric.count} | ${formatDurationMinutes(metric.durationSec)}</div>
    `;
    calendarGrid.appendChild(cell);
  }
}

function beginRunRecord() {
  activeRun = {
    id: typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : `run-${Date.now()}`,
    startedAtMs: Date.now(),
    startedAt: new Date().toISOString(),
    settings: getSettingsSnapshot(),
    sessionRemainingAtStart: sessionLeft
  };
}

function finalizeRunRecord(reason) {
  if (!activeRun) return;
  const endedAtMs = Date.now();
  const durationSec = Math.max(1, Math.ceil((endedAtMs - activeRun.startedAtMs) / 1000));
  const record = {
    id: activeRun.id,
    startedAt: activeRun.startedAt,
    endedAt: new Date(endedAtMs).toISOString(),
    durationSec,
    settings: activeRun.settings,
    sessionRemainingAtStart: activeRun.sessionRemainingAtStart,
    sessionRemainingAtEnd: sessionLeft,
    reason
  };
  activeRun = null;
  saveHistoryRecords([...historyRecords, record]);
  void syncHistoryToCloud();
}

function ensureAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (error) {
      console.error('Audio init failed:', error);
    }
  }
}

function playBeep(durationSec) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 600;
  const now = audioCtx.currentTime;
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.06, now + 0.03);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + durationSec + 0.05);
}

function playPhaseTone(name) {
  playBeep(name === 'pause' ? 0.4 : 1.2);
}

function startPhase(name) {
  phase = name;
  if (name === 'pause') {
    secondsLeft = getPause();
    circle.classList.remove('vibrating');
    circle.style.transitionDuration = '0s';
    label.textContent = '停' + secondsLeft;
    if (running) playPhaseTone('pause');
    return;
  }
  secondsLeft = name === 'inhale' ? getInhale() : getExhale();
  circle.classList.add('vibrating');
  circle.style.transitionDuration = secondsLeft + 's';
  circle.style.transform = name === 'inhale' ? 'scale(1)' : 'scale(0.7)';
  label.textContent = (name === 'inhale' ? '吸' : '呼') + secondsLeft;
  if (running) playPhaseTone(name);
}

function tick() {
  sessionLeft -= 1;
  if (sessionLeft <= 0) {
    finish();
    return;
  }
  remainingEl.textContent = formatTime(sessionLeft);
  secondsLeft -= 1;
  if (secondsLeft > 0) {
    label.textContent = phase === 'pause' ? ('停' + secondsLeft) : ((phase === 'inhale' ? '吸' : '呼') + secondsLeft);
    return;
  }
  if (phase === 'pause') {
    startPhase(nextAfterPause || 'inhale');
    nextAfterPause = null;
    return;
  }
  const pause = getPause();
  if (pause > 0) {
    nextAfterPause = phase === 'inhale' ? 'exhale' : 'inhale';
    startPhase('pause');
    return;
  }
  startPhase(phase === 'inhale' ? 'exhale' : 'inhale');
}

function start() {
  if (running) return;
  if (sessionLeft <= 0) {
    sessionLeft = DEFAULT_SESSION_SECONDS;
    remainingEl.textContent = formatTime(sessionLeft);
  }
  if (secondsLeft <= 0) {
    startPhase(phase);
  }
  beginRunRecord();
  running = true;
  toggleBtn.textContent = '结束';
  ensureAudio();
  timer = window.setInterval(tick, 1000);

  if (typeof gtag === 'function') {
    gtag('event', 'start_practice', {
      inhale: getInhale(),
      exhale: getExhale(),
      pause: getPause()
    });
  }
}

function stop(reason = 'stop') {
  if (!running && !activeRun) return;
  running = false;
  toggleBtn.textContent = '开始';
  if (timer) {
    clearInterval(timer);
    timer = null;
  }
  circle.classList.remove('vibrating');
  finalizeRunRecord(reason);

  if (typeof gtag === 'function') {
    gtag('event', 'stop_practice', {
      remaining_seconds: sessionLeft
    });
  }
}

function finish() {
  stop('finish');
  label.textContent = '完成';
  circle.style.transitionDuration = '0.5s';
  circle.style.transform = 'scale(1)';
  remainingEl.textContent = '00:00';
  circle.classList.remove('vibrating');

  if (typeof gtag === 'function') {
    gtag('event', 'complete_practice');
  }
}

function generateWaves() {
  const path = document.getElementById('wavePath');
  const size = 352;
  const centerX = size / 2;
  const centerY = size / 2;
  const baseRadius = size / 2;
  const maxWaveHeight = 24;
  const segments = 24;
  const points = [];

  for (let index = 0; index < segments; index += 1) {
    const angle = (index / segments) * Math.PI * 2;
    const sineValue = Math.sin(angle * 6);
    const normalizedSine = (sineValue + 1) / 2;
    const radius = baseRadius - normalizedSine * maxWaveHeight;

    points.push({
      x: centerX + Math.cos(angle) * radius,
      y: centerY + Math.sin(angle) * radius
    });
  }

  const midPoints = [];
  for (let index = 0; index < points.length; index += 1) {
    const pointA = points[index];
    const pointB = points[(index + 1) % points.length];
    midPoints.push({
      x: (pointA.x + pointB.x) / 2,
      y: (pointA.y + pointB.y) / 2
    });
  }

  let d = `M ${midPoints[0].x} ${midPoints[0].y}`;
  for (let index = 0; index < points.length; index += 1) {
    const controlPoint = points[(index + 1) % points.length];
    const destination = midPoints[(index + 1) % midPoints.length];
    d += ` Q ${controlPoint.x} ${controlPoint.y}, ${destination.x} ${destination.y}`;
  }

  path.setAttribute('d', d);
}

function trackSettingChange(setting, value) {
  if (typeof gtag === 'function') {
    gtag('event', 'update_setting', {
      setting_name: setting,
      value
    });
  }
}

function jumpToMonth() {
  const input = window.prompt('请输入年月（YYYY-MM）', formatMonthInput(displayedMonth));
  if (!input) return;
  const match = input.trim().match(/^(\d{4})-(\d{1,2})$/);
  if (!match) {
    window.alert('请输入正确格式，例如：2026-04');
    return;
  }
  const year = Number(match[1]);
  const month = Number(match[2]);
  if (month < 1 || month > 12) {
    window.alert('月份需要在 1 到 12 之间。');
    return;
  }
  displayedMonth = new Date(year, month - 1, 1);
  renderCalendar();
}

toggleBtn.addEventListener('click', () => {
  if (!running) {
    start();
  } else {
    stop('stop');
  }
});

configBtn.addEventListener('click', () => {
  r2Sync.createConfigDialog(async () => {
    const mergedFromCloud = await hydrateHistoryFromCloud();
    if (historyRecords.length > 0 || mergedFromCloud) {
      await syncHistoryToCloud();
    } else {
      refreshSyncStatus();
    }
  });
});

prevMonthBtn.addEventListener('click', () => {
  displayedMonth = shiftMonth(displayedMonth, -1);
  renderCalendar();
});

nextMonthBtn.addEventListener('click', () => {
  displayedMonth = shiftMonth(displayedMonth, 1);
  renderCalendar();
});

monthTitleBtn.addEventListener('click', jumpToMonth);

inhaleRange.addEventListener('input', () => {
  inhaleVal.textContent = inhaleRange.value;
  saveSettings();
  if (!running && sessionLeft > 0 && phase === 'inhale') {
    label.textContent = '吸' + inhaleRange.value;
  }
});

exhaleRange.addEventListener('input', () => {
  exhaleVal.textContent = exhaleRange.value;
  saveSettings();
  if (!running && sessionLeft > 0 && phase === 'exhale') {
    label.textContent = '呼' + exhaleRange.value;
  }
});

pauseRange.addEventListener('input', () => {
  pauseVal.textContent = pauseRange.value;
  saveSettings();
  if (!running && sessionLeft > 0 && phase === 'pause') {
    label.textContent = '停' + pauseRange.value;
  }
});

inhaleRange.addEventListener('change', () => trackSettingChange('inhale', getInhale()));
exhaleRange.addEventListener('change', () => trackSettingChange('exhale', getExhale()));
pauseRange.addEventListener('change', () => trackSettingChange('pause', getPause()));

async function init() {
  loadSettings();
  remainingEl.textContent = formatTime(sessionLeft);
  label.textContent = '吸' + inhaleRange.value;
  generateWaves();
  renderCalendar();
  refreshSyncStatus();
  const mergedFromCloud = await hydrateHistoryFromCloud();
  if (mergedFromCloud && historyRecords.length > 0) {
    await syncHistoryToCloud();
  }
}

void init();
</script>
</body>
